<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAM Session - Digital Nomads FLN</title>
  <meta name="description" content="Know who plays what at the jam session. Browse members, their instruments, and the songs they perform." />
  <link rel="stylesheet" href="style.css?v=19" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-inner">
      <a class="logo" href="#">
        <img src="logo.png" alt="Logo" class="logo-img" />
        <div class="logo-text-group">
          <div class="logo-title">Jam<span>Session</span></div>
          <div class="logo-subtitle">Digital Nomads FLN</div>
        </div>
      </a>

      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search…" />
      </div>

      <div class="header-actions">
        <button id="add-member-btn" class="btn btn-primary">
          + Add Members
        </button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>
    <div class="section-header">
      <h1 class="section-title">
        <span id="section-title-text">The Crew</span>
        <span class="section-count"></span>
      </h1>
      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" id="toggle-members">🎼 The Crew</button>
        <button class="toggle-btn" id="toggle-songbook">📖 Songbook</button>
        <button class="toggle-btn" id="toggle-bandbook">🤘 Bandbook</button>
      </div>
    </div>

    <!-- Role filter chips (hidden in song/bandbook view) -->
    <div class="filter-bar" id="filter-bar" role="group" aria-label="Filter by role"></div>

    <!-- Members grid -->
    <div class="members-grid" id="members-grid" role="list"></div>

    <!-- Songbook grid (hidden by default) -->
    <div class="songbook-grid hidden" id="songbook-grid" role="list"></div>

    <!-- Bandbook grid (hidden by default) -->
    <div class="songbook-grid hidden" id="bandbook-grid" role="list"></div>
  </main>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ===== TOASTS ===== -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="app.js?v=19"></script>
</body>
</html>
